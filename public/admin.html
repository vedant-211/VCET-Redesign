<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCET Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03050f;
            --surface: #0a1228;
            --surface2: #0f1a35;
            --accent: #00c8ff;
            --accent2: #7b4fff;
            --text: #e8eeff;
            --muted: #7a8ab0;
            --border: rgba(0,200,255,0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
        
        /* Auth View */
        #auth-view { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--surface); padding: 2.5rem; border-radius: 16px; border: 1px solid var(--border); width: 100%; max-width: 360px; text-align: center; }
        .auth-card h2 { font-family: 'Syne', sans-serif; color: var(--accent); margin-bottom: 0.5rem; }
        .form-control { width: 100%; padding: 0.8rem; margin: 0.8rem 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); color: #fff; }
        .btn { width: 100%; padding: 0.9rem; border-radius: 8px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }

        /* Dashboard View */
        #dashboard-view { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        header h1 { font-family: 'Syne', sans-serif; color: var(--accent); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--surface); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); }
        .stat-num { font-size: 2rem; font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent2); }
        
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .search-bar { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: #fff; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 0.8rem; border-bottom: 1px solid var(--border); }
        th { color: var(--muted); font-size: 0.85rem; text-transform: uppercase; }
        .badge { padding: 0.3rem 0.6rem; border-radius: 100px; font-size: 0.75rem; font-weight: 600; }
        .badge.new { background: rgba(0,200,255,0.1); color: var(--accent); }
        .badge.contacted { background: rgba(123,79,255,0.1); color: var(--accent2); }
        
        .action-btn { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; transition: 0.2s; font-size: 0.75rem; }
        .action-btn:hover { border-color: var(--accent); color: var(--accent); }
        
        #toast { position: fixed; bottom: 20px; right: 20px; padding: 1rem; background: var(--accent); color: #000; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div id="auth-view">
        <div class="auth-card">
            <h2>Admin Portal</h2>
            <p style="font-size:0.85rem;color:var(--muted);margin-bottom:1rem;">Login to manage the VCET app</p>
            <form id="login-form">
                <input type="text" id="username" class="form-control" placeholder="Username" required>
                <input type="password" id="password" class="form-control" placeholder="Password" required>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>
    </div>

    <div id="dashboard-view">
        <header>
            <h1>VCET Dashboard</h1>
            <button class="action-btn" id="logout-btn">Logout</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div style="font-size:0.8rem;color:var(--muted)">Total Enquiries</div>
                <div class="stat-num" id="s-total">0</div>
            </div>
            <div class="stat-card">
                <div style="font-size:0.8rem;color:var(--muted)">New Enquiries</div>
                <div class="stat-num" id="s-new" style="color:var(--accent)">0</div>
            </div>
            <div class="stat-card">
                <div style="font-size:0.8rem;color:var(--muted)">Active Notices</div>
                <div class="stat-num" id="s-notices">0</div>
            </div>
            <div class="stat-card">
                <div style="font-size:0.8rem;color:var(--muted)">Upcoming Events</div>
                <div class="stat-num" id="s-events">0</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <h3>Admission Enquiries</h3>
                <input type="text" id="search-enquiries" class="search-bar" placeholder="Search by name/course...">
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Course</th>
                            <th>Contact</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="enquiries-tbody">
                        <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast">Saved Successfully.</div>

    <script src="/js/admin.js"></script>
</body>
</html>
